name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  MPLBACKEND: Agg
  DISABLE_TELEMETRY: "1"

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest

      - name: Compile Python entry points
        run: |
          python -m py_compile skills/elsevier-figure-style/scripts/elsevier_plot_style.py
          python -m py_compile skills/elsevier-figure-style/scripts/check_elsevier_figure_style.py
          python -m py_compile skills/elsevier-figure-style/scripts/check_exported_figure_metadata.py
          python -m py_compile skills/elsevier-figure-style/scripts/init_figure_style_project.py
          python -m py_compile skills/elsevier-figure-style/scripts/check_environment.py

      - name: Check runtime environment
        run: python skills/elsevier-figure-style/scripts/check_environment.py

  integration:
    name: Demos and Skill discovery
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run compliant Python demos
        run: |
          python examples/python/good_line_plot.py
          python examples/python/good_heatmap.py
          python examples/python/good_bar.py
          python examples/python/good_scatter.py
          python examples/readme/generate_before_after.py

      - name: Check compliant Python examples
        run: |
          python skills/elsevier-figure-style/scripts/check_elsevier_figure_style.py --path examples/python --profile editor
          python skills/elsevier-figure-style/scripts/check_elsevier_figure_style.py --path examples/python --profile strict

      - name: Check expected Python failure
        run: |
          if python skills/elsevier-figure-style/scripts/check_elsevier_figure_style.py --path examples/bad/non_compliant_plot.py --profile editor; then
            echo "Expected non-compliant demo to fail"
            exit 1
          fi

      - name: Check exported figure metadata
        run: |
          python examples/schematic/generate_metadata_fixtures.py
          python skills/elsevier-figure-style/scripts/check_exported_figure_metadata.py --path examples/outputs/schematic_demo.png --figure-type schematic --artwork-type halftone --profile editor
          python skills/elsevier-figure-style/scripts/check_exported_figure_metadata.py --path examples/outputs/schematic_demo.tiff --figure-type schematic --artwork-type halftone --target-layout single --profile editor
          python skills/elsevier-figure-style/scripts/check_exported_figure_metadata.py --path examples/outputs/readme/bitmap --figure-type result --artwork-type line --target-layout one-half --profile editor
          python skills/elsevier-figure-style/scripts/check_exported_figure_metadata.py --path examples/schematic/schematic_demo.svg --figure-type schematic --profile editor
          python skills/elsevier-figure-style/scripts/check_exported_figure_metadata.py --path examples/schematic/bad_schematic.svg --figure-type schematic --profile editor
          if python skills/elsevier-figure-style/scripts/check_exported_figure_metadata.py --path examples/outputs/bad_graphical_abstract.png --figure-type graphical-abstract --profile editor; then
            echo "Expected low-resolution graphical abstract demo to fail"
            exit 1
          fi

      - name: Validate skills CLI discovery
        run: npx --yes skills@1.5.15 add . --list

      - name: Smoke-test installed Skill bundle
        run: |
          install_root="$(mktemp -d)"
          cd "$install_root"
          npx --yes skills@1.5.15 add "$GITHUB_WORKSPACE" --skill elsevier-figure-style --agent codex --copy -y
          installed="$install_root/.agents/skills/elsevier-figure-style"
          test -f "$installed/requirements.txt"
          python "$installed/scripts/check_environment.py"
          python "$installed/scripts/check_elsevier_figure_style.py" --path "$GITHUB_WORKSPACE/examples/python" --profile editor

  r-demo:
    name: R profile and ggplot2 demo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          extra-packages: |
            any::ggplot2
            any::jsonlite

      - name: Parse R helper
        run: |
          Rscript -e 'parse(file="skills/elsevier-figure-style/scripts/elsevier_theme.R"); source("skills/elsevier-figure-style/scripts/elsevier_theme.R"); profile <- load_journal_profile("skills/elsevier-figure-style/assets/elsevier_figure_style.json"); family <- .resolve_journal_font_family(profile$style$font$sans_serif); stopifnot(profile$style$font$size == 11, profile$style$font$tick_size == 10, profile$style$line$linewidth == 1, family %in% c(profile$style$font$sans_serif, "sans"))'

      - name: Reject an inconsistent R profile
        run: |
          Rscript -e 'source("skills/elsevier-figure-style/scripts/elsevier_theme.R"); path <- "skills/elsevier-figure-style/assets/elsevier_figure_style.json"; profile <- load_journal_profile(path); profile$style$figure$line_art_dpi <- 900; result <- try(validate_journal_profile(profile, path), silent = TRUE); stopifnot(inherits(result, "try-error"))'

      - name: Run R demo
        run: Rscript examples/r/good_ggplot_demo.R
